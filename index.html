<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Flip7 Room</title>
    <style>
      :root {
        --bg: #f5efe4;
        --panel: #fffaf2;
        --ink: #1f2a21;
        --accent: #0f766e;
        --accent-2: #d97706;
        --line: #d8c7ab;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(217, 119, 6, 0.18), transparent 35%),
          radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.2), transparent 30%),
          var(--bg);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        margin: 24px auto 40px;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 30px rgba(60, 41, 11, 0.08);
      }

      h1, h2, h3, p { margin-top: 0; }

      .controls,
      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      input,
      button {
        font: inherit;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 12px 16px;
      }

      input {
        background: #fff;
        min-width: 180px;
      }

      button {
        cursor: pointer;
        color: white;
        border: none;
        background: var(--accent);
      }

      button.secondary {
        background: var(--accent-2);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .status {
        display: grid;
        gap: 8px;
      }

      .players {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 12px;
      }

      .player {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.75);
      }

      .player.current {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      .tag {
        display: inline-block;
        margin-right: 6px;
        margin-top: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.85rem;
        background: rgba(15, 118, 110, 0.12);
      }

      .messages {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
        max-height: 240px;
        overflow: auto;
      }

      .messages li {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(217, 119, 6, 0.08);
      }

      #form {
        display: flex;
        gap: 10px;
      }

      #input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Flip7 dans une room Socket.IO</h1>
        <div class="controls">
          <input id="playerName" placeholder="Ton nom" value="Joueur">
          <input id="roomId" placeholder="Code room">
          <button id="joinRoom">Rejoindre la room</button>
          <button id="startGame" class="secondary">Lancer une manche</button>
        </div>
      </section>

      <section class="panel status">
        <h2>Etat de la room</h2>
        <p id="roomSummary">Aucune room rejointe.</p>
        <p id="roomAction">En attente d'une action.</p>
        <div class="action-row">
          <button id="drawCard">Piocher</button>
          <button id="standTurn" class="secondary">Stopper</button>
        </div>
      </section>

      <section class="panel">
        <h2>Joueurs</h2>
        <div id="players" class="players"></div>
      </section>

      <section class="panel">
        <h2>Resultats de la derniere manche</h2>
        <ul id="roundResults" class="messages"></ul>
      </section>

      <section class="panel">
        <h2>Chat</h2>
        <ul id="messages" class="messages"></ul>
        <form id="form" action="">
          <input id="input" autocomplete="off" placeholder="Votre message" />
          <button>Envoyer</button>
        </form>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      const roomSummary = document.getElementById('roomSummary');
      const roomAction = document.getElementById('roomAction');
      const players = document.getElementById('players');
      const roundResults = document.getElementById('roundResults');
      const joinRoomButton = document.getElementById('joinRoom');
      const startGameButton = document.getElementById('startGame');
      const drawCardButton = document.getElementById('drawCard');
      const standTurnButton = document.getElementById('standTurn');
      const playerNameInput = document.getElementById('playerName');
      const roomIdInput = document.getElementById('roomId');

      let currentRoom = null;

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        if (!input.value) {
          return;
        }

        socket.emit('chat message', input.value);
        input.value = '';
      });

      joinRoomButton.addEventListener('click', () => {
        socket.emit('room:join', {
          roomId: roomIdInput.value,
          name: playerNameInput.value
        });
      });

      startGameButton.addEventListener('click', () => {
        socket.emit('room:start-game');
      });

      drawCardButton.addEventListener('click', () => {
        socket.emit('flip7:draw');
      });

      standTurnButton.addEventListener('click', () => {
        socket.emit('flip7:stand');
      });

      function addMessage(msg) {
        const item = document.createElement('li');
        item.textContent = msg.user + ' : ' + msg.text;
        messages.appendChild(item);
      }

      function renderPlayers(room) {
        players.innerHTML = '';

        room.players.forEach((player) => {
          const item = document.createElement('article');
          item.className = 'player';

          if (player.id === room.currentPlayerId) {
            item.classList.add('current');
          }

          const tags = [];
          if (player.id === room.hostId) tags.push('hote');
          if (player.id === socket.id) tags.push('toi');
          if (player.isOut) tags.push('elimine');
          if (player.hasStopped) tags.push('stop');
          if (player.hasFlipped7) tags.push('flip7');

          item.innerHTML = `
            <h3>${player.name}</h3>
            <p>Score : <strong>${player.score}</strong></p>
            <p>Main (${player.handSize}) : ${player.handValues.join(', ') || 'aucune carte'}</p>
            <div>${tags.map((tag) => `<span class="tag">${tag}</span>`).join('')}</div>
          `;

          players.appendChild(item);
        });
      }

      function renderRoundResults(room) {
        roundResults.innerHTML = '';

        if (!room.lastRoundResults.length) {
          const empty = document.createElement('li');
          empty.textContent = 'Aucun resultat pour le moment.';
          roundResults.appendChild(empty);
          return;
        }

        room.lastRoundResults.forEach((result) => {
          const item = document.createElement('li');
          item.textContent = `${result.name} | cartes: ${result.handValues.join(', ') || 'aucune'} | points: ${result.pointsWon}`;
          roundResults.appendChild(item);
        });
      }

      function renderRoom(room) {
        currentRoom = room;
        roomSummary.textContent =
          `Room ${room.id} | statut: ${room.status} | manche: ${room.round} | deck: ${room.deckCount} cartes`;
        roomAction.textContent = room.lastAction || 'En attente d une action.';

        const isCurrentPlayer = room.currentPlayerId === socket.id;
        const isHost = room.hostId === socket.id;

        startGameButton.disabled = !isHost;
        drawCardButton.disabled = room.status !== 'playing' || !isCurrentPlayer;
        standTurnButton.disabled = room.status !== 'playing' || !isCurrentPlayer;

        renderPlayers(room);
        renderRoundResults(room);
      }

      socket.on('chat message', (msg) => {
        addMessage(msg);
      });

      socket.on('history', (msgs) => {
        msgs.forEach((msg) => addMessage(msg));
      });

      socket.on('room:update', (room) => {
        renderRoom(room);
      });

      socket.on('room:error', (message) => {
        addMessage({ user: 'SYSTEM', text: message });
      });
    </script>
  </body>
</html>
